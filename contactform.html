<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contactForm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="section-1">

            <h2 class="section-1__Name">PAVITHRA BALAJI</h2>

            <h3 class="section-1__Role">FullStack Developer</h3>
            <a class="section-1__contact" href="index.html">Home</a>

        </div>
        <div class="contactform">
        <form>
            <table>
                <tr>
                    <td><label>Name:</label></td>
                    <td><input type="text" placeholder="Your Name" class="contactform__input"></td>
                </tr>
                <tr>
                    <td><label>Email:</label></td>
                    <td><input type="text" placeholder="Your Email" class="contactform__input"></td>
                </tr>
                <tr>
                    <td><label>Message:</label></td>
                    <td><textarea placeholder="Your message" class="contactform__textarea"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit"class="contactform__submit"></td>
                </tr>
            </table>
        </form>
        </div>

        <div class="section-8">
        <p class="section-8__title">Social Media:
            <a href="https://www.linkedin.com/in/pavithra-b-6428751a6/" target="_blank">LinkedIn</a>
        </p>
        <p class="section-8__desc">&copy; Pavithra Balji</p></div>
    </div>
</body>

</html>
